name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Module catalog --check (structural source of truth must not drift)
        run: python scripts/generate_catalog.py --check
      - name: Repository validation
        run: python scripts/testing/validate_repository.py
      - name: Tests
        run: python -m pytest -q
